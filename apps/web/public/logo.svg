<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aspect">
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="440" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#222a3c"/>
      <stop offset="0.55" stop-color="#191a21"/>
      <stop offset="1" stop-color="#241d14"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lit" x1="92" y1="92" x2="242" y2="242" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e7e9ee"/>
    </linearGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- App-icon squircle background -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#bg)"/>
  <rect x="16.5" y="16.5" width="479" height="479" rx="115.5" fill="none" stroke="#ffffff" stroke-opacity="0.09"/>

  <!-- Glow behind the lit tile -->
  <circle cx="167" cy="167" r="150" fill="url(#glow)" filter="url(#soft)" opacity="0.6"/>

  <!-- Frosted tiles -->
  <rect x="270" y="92" width="150" height="150" rx="42" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12"/>
  <rect x="92" y="270" width="328" height="150" rx="42" fill="#ffffff" fill-opacity="0.07" stroke="#ffffff" stroke-opacity="0.12"/>

  <!-- The "active" tile: lit, like a device turned on -->
  <rect x="92" y="92" width="150" height="150" rx="42" fill="url(#lit)"/>
  <rect x="92.75" y="92.75" width="148.5" height="148.5" rx="41.25" fill="none" stroke="#ffffff" stroke-opacity="0.9"/>
  <!-- small dark chip inside the lit tile, echoing a device icon -->
  <rect x="120" y="120" width="44" height="44" rx="14" fill="#191c24"/>
  <circle cx="142" cy="142" r="9" fill="#ffffff"/>
</svg>
